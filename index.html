<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sham Cars</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>🚗 Sham Cars</h1>
    <p>Premium Car Collection</p>
</header>

<nav>
    <a href="#">Home</a>
    <a href="#">Cars</a>
    <a href="#">Contact</a>
</nav>

<!-- 🔍 Search -->
<div class="search-box">
    <input type="text" id="searchInput" placeholder="Search cars..." onkeyup="searchCars()">
</div>

<!-- 🛒 Cart -->
<div class="cart">
    🛒 Cart: <span id="cartCount">0</span>
</div>

<!-- 🚘 Cars -->
<section class="cars" id="carList">

    <div class="car">
        <img src="https://images.unsplash.com/photo-1555215695-3004980ad54c?auto=format&fit=crop&w=800&q=80">
        <h2>BMW M4</h2>
        <button onclick="addToCart('BMW M4')">Add to Cart</button>
    </div>

    <div class="car">
        <img src="https://images.unsplash.com/photo-1503736334956-4c8f8e92946d?auto=format&fit=crop&w=800&q=80">
        <h2>Audi R8</h2>
        <button onclick="addToCart('Audi R8')">Add to Cart</button>
    </div>

    <div class="car">
        <img src="https://cdn.pixabay.com/photo/2017/03/27/14/56/auto-2179220_1280.jpg">
        <h2>Mercedes AMG</h2>
        <button onclick="addToCart('Mercedes AMG')">Add to Cart</button>
    </div>

    <div class="car">
        <img src="https://images.unsplash.com/photo-1511919884226-fd3cad34687c?auto=format&fit=crop&w=800&q=80">
        <h2>Lamborghini</h2>
        <button onclick="addToCart('Lamborghini')">Add to Cart</button>
    </div>

</section>

<footer>
    <p>© 2026 Sham Cars | All Rights Reserved</p>
</footer>

<script src="script.js"></script>

</body>
</html>
